name: CI

on:
  push:
  pull_request:

jobs:
  repository-safety:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Compile source
        run: |
          python -m compileall wq_workflow tools

      - name: Build release artifact
        run: |
          python tools/build_release.py --version ci

      - name: Check release artifact hygiene
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          dist = Path("dist")
          zips = sorted(dist.glob("*.zip"))
          if not zips:
              raise SystemExit("No release zip generated in dist/")

          forbidden_names = {
              "config.json",
              ".env",
          }

          forbidden_prefixes = (
              "runtime/",
              "iterations/",
              "favorites/",
              "logs/",
              "cookies/",
              "tokens/",
              "screenshots/",
              "failure_artifacts/",
              "browser_cache/",
              ".playwright/",
          )

          forbidden_suffixes = (
              ".db",
              ".sqlite",
              ".sqlite3",
              ".log",
          )

          violations = []

          for zip_path in zips:
              with zipfile.ZipFile(zip_path) as zf:
                  for raw_name in zf.namelist():
                      name = raw_name.replace("\\", "/")
                      rel = "/".join(name.split("/")[1:]) if "/" in name else name
                      base = Path(rel).name

                      if base in forbidden_names:
                          violations.append(name)
                          continue

                      if any(rel == p.rstrip("/") or rel.startswith(p) for p in forbidden_prefixes):
                          violations.append(name)
                          continue

                      if rel.endswith(forbidden_suffixes):
                          violations.append(name)
                          continue

          if violations:
              print("Forbidden files found in release artifact:")
              for item in violations:
                  print(" -", item)
              raise SystemExit(1)

          print(f"Release artifact hygiene check passed: {len(zips)} zip file(s), violations=0")
          PY

      - name: Full pytest notice
        run: |
          echo "Full pytest is intentionally not enforced in CI yet because existing environment-dependent/core tests are not fully stabilized."
          echo "Use local/pre-release pytest as a diagnostic gate until those legacy failures are fixed in a dedicated core-test stabilization change."
